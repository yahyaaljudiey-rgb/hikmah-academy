<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Levels</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
      }
      h1 {
        margin-bottom: 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background: #f5f5f5;
      }
      tr:nth-child(even) {
        background: #fafafa;
      }
      a.button-link {
        display: inline-block;
        padding: 4px 8px;
        border: 1px solid #1f6feb;
        color: #1f6feb;
        text-decoration: none;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Levels</h1>

    <table>
      <thead>
        <tr>
          <th>Level Name</th>
          <th>Teacher</th>
          <th>Zoom</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
        {% for level in levels %}
        <tr>
          <td>{{ level.name }}</td>
          <td>{{ level.teacher.full_name if level.teacher else '' }}</td>
          <td>
            {% if level.zoom_link %}
            <a class="button-link" href="{{ level.zoom_link }}" target="_blank" rel="noopener noreferrer">Join Zoom</a>
            {% else %}
            -
            {% endif %}
          </td>
          <td><a href="/levels/{{ level.id }}">View</a></td>
        </tr>
        {% else %}
        <tr>
          <td colspan="4">No levels found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <p><a href="/">Back to dashboard</a></p>
  </body>
</html>
